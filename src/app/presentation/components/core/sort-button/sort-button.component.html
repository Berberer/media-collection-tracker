<button class="btn btn-ghost btn-xs" (click)="toggle()">
  @if (direction() === SortDirection.ASC) {
    <ng-icon name="heroChevronUpSolid"></ng-icon>
  } @else if (direction() === SortDirection.DESC) {
    <ng-icon name="heroChevronDownSolid"></ng-icon>
  } @else {
    <ng-icon name="heroArrowsUpDownSolid"></ng-icon>
  }
</button>
