services:
  app:
    build: .
    ports:
      - '8090:8090'
    volumes:
      - pb-data:/pb_data
    environment:
      - PB_ADMIN_EMAIL=admin@example.com
      - PB_ADMIN_PASSWORD=MySecretAdminPassword123
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8090/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  pb-data:
